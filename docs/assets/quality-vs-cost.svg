  <path d="M0 458C118 407 212 426 349 379C490 330 621 345 743 392C860 437 950 488 1052 444C1084 430 1104 422 1120 426V560H0V458Z" fill="#136F63" opacity="0.58"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">

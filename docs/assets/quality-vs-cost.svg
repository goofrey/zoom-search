        <text x="16" y="43" fill="#64748B" font-size="12">Syntax-sensitive reusable workflow answer</text>
        <text x="330" y="36" fill="#047857" font-size="18" font-weight="800">1 -> 4</text>
        <text x="508" y="36" fill="#047857" font-size="18" font-weight="800">2.0 -> 7.8</text>

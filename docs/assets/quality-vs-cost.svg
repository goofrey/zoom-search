<svg width="1120" height="560" viewBox="0 0 1120 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Zoom Search quality versus cost benchmark summary</title>
  <desc id="desc">Benchmark summary showing good result and answer quality gains alongside extra latency, tokens, and search requests.</desc>
  <rect width="1120" height="560" rx="28" fill="#0B1020"/>

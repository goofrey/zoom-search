      <text x="535" y="80" fill="#475569" font-size="13" font-weight="700">Answer quality</text>
      <text x="720" y="80" fill="#475569" font-size="13" font-weight="700">Extra time</text>
      <text x="850" y="80" fill="#475569" font-size="13" font-weight="700">Extra tokens</text>

      <g transform="translate(30 104)">

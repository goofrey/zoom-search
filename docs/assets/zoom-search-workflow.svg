<svg width="980" height="260" viewBox="0 0 980 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Zoom Search workflow</title>
  <desc id="desc">Question to query rewriting, broad search, domain zoom-in, evidence, and answer.</desc>

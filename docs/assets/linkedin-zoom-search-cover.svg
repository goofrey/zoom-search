<svg width="1200" height="627" viewBox="0 0 1200 627" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Zoom Search LinkedIn cover</title>
  <desc id="desc">A LinkedIn cover image for Zoom Search, a precise AI web search library for Python.</desc>

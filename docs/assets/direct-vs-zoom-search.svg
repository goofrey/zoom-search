<svg width="1120" height="560" viewBox="0 0 1120 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Direct Search vs Zoom Search comparison</title>
  <desc id="desc">A side-by-side visual comparison showing direct search results on the left and Zoom Search synthesized answer with sources on the right.</desc>
  <rect width="1120" height="560" rx="28" fill="#0B1020"/>
  <path d="M0 401C102 342 190 373 298 315C420 250 535 212 672 276C792 331 875 404 1002 350C1050 329 1086 306 1120 312V560H0V401Z" fill="#123E59" opacity="0.72"/>
  <path d="M0 462C112 403 209 427 338 374C476 317 592 334 720 387C839 436 938 488 1047 435C1079 420 1100 410 1120 414V560H0V462Z" fill="#136F63" opacity="0.58"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="560" y="54" text-anchor="middle" fill="#F8FAFC" font-size="28" font-weight="800">Direct Search vs Zoom Search</text>
    <text x="560" y="84" text-anchor="middle" fill="#CBD5E1" font-size="15">Same question, different workflow: links alone vs evidence-backed answer synthesis.</text>
    <g transform="translate(56 112)">
      <rect width="480" height="390" rx="18" fill="#F8FAFC"/>
      <rect x="24" y="22" width="160" height="30" rx="15" fill="#DBEAFE"/>
      <text x="104" y="42" text-anchor="middle" fill="#1E3A8A" font-size="13" font-weight="800">DIRECT SEARCH</text>
      <text x="24" y="85" fill="#0F172A" font-size="18" font-weight="800">Question</text>
      <text x="24" y="114" fill="#334155" font-size="15">What hotels in Shenzhen have rooms with exercise bikes?</text>
      <text x="24" y="162" fill="#0F172A" font-size="18" font-weight="800">Output</text>
      <g transform="translate(24 184)">
        <rect width="432" height="54" rx="10" fill="#EFF6FF"/>
        <text x="16" y="23" fill="#1D4ED8" font-size="14" font-weight="700">1. Hotel fitness rooms guide</text>
        <text x="16" y="42" fill="#475569" font-size="12">Snippet mentions gyms, wellness suites, and booking pages.</text>
      </g>
      <g transform="translate(24 250)">
        <rect width="432" height="54" rx="10" fill="#EFF6FF"/>
        <text x="16" y="23" fill="#1D4ED8" font-size="14" font-weight="700">2. Shenzhen hotel results</text>
        <text x="16" y="42" fill="#475569" font-size="12">Search result list needs manual inspection and comparison.</text>
      </g>
      <g transform="translate(24 316)">
        <rect width="432" height="54" rx="10" fill="#EFF6FF"/>
        <text x="16" y="23" fill="#1D4ED8" font-size="14" font-weight="700">3. Travel forum discussion</text>
        <text x="16" y="42" fill="#475569" font-size="12">Potentially relevant, but source quality is uncertain.</text>
      </g>
    </g>
    <g transform="translate(584 112)">
      <rect width="480" height="390" rx="18" fill="#F8FAFC"/>
      <rect x="24" y="22" width="160" height="30" rx="15" fill="#D1FAE5"/>
      <text x="104" y="42" text-anchor="middle" fill="#065F46" font-size="13" font-weight="800">ZOOM SEARCH</text>
      <text x="24" y="85" fill="#0F172A" font-size="18" font-weight="800">Workflow</text>
      <text x="24" y="114" fill="#334155" font-size="15">Rewrite query -> broad search -> source zoom-in -> evidence -> answer</text>
      <text x="24" y="162" fill="#0F172A" font-size="18" font-weight="800">Output</text>
      <g transform="translate(24 184)">
        <rect width="432" height="72" rx="10" fill="#ECFDF5"/>
        <text x="16" y="24" fill="#047857" font-size="14" font-weight="800">Answer</text>
        <text x="16" y="46" fill="#334155" font-size="12">Ranks likely candidates and explains why each source matters.</text>
        <text x="16" y="62" fill="#334155" font-size="12">Keeps the result grounded in retrieved evidence.</text>
      </g>
      <g transform="translate(24 270)">
        <rect width="432" height="46" rx="10" fill="#F5F3FF"/>
        <text x="16" y="20" fill="#6D28D9" font-size="13" font-weight="800">Sources</text>
        <text x="92" y="20" fill="#475569" font-size="12">source domains, URLs, snippets, duplicate provenance</text>
      </g>
      <g transform="translate(24 328)">
        <rect width="432" height="42" rx="10" fill="#FFF7ED"/>
        <text x="16" y="25" fill="#9A3412" font-size="13" font-weight="800">Traceability</text>
        <text x="120" y="25" fill="#475569" font-size="12">rewrite group, phase, query variant, metrics</text>
      </g>
    </g>
  </g>
</svg>
